version: '3.8'

services:
  disbox:
    build: .
    container_name: disbox
    restart: unless-stopped
    ports:
      - "8080:8080" # Map to the PROXY_PORT defined in your .env
    volumes:
      - ./data:/app/data
    working_dir: /app/data
    env_file:
      - .env
    command: ["/app/disbox"]
    depends_on:
      - og-service

  og-service:
    build: ./og-service
    container_name: og-service
    restart: unless-stopped
    ports:
      - "3000:3000"
